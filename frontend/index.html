<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soporte Ayto. Aranjuez</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Iconos Phosphor (Modernos y limpios) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <!-- CONTENEDOR LOGIN -->
    <div id="login-container" class="layout-login">
        <div class="glass-card login-box">
            <div class="brand">
                <i class="ph ph-shield-check shield-icon"></i>
                <h1>Soporte TI Aranjuez</h1>
                <p>Acceso al sistema de incidencias</p>
            </div>
            
            <form id="login-form">
                <div class="input-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" placeholder="Nombre de usuario" required>
                </div>
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary">Iniciar Sesión</button>
                <div id="login-error" class="error-msg"></div>
            </form>
        </div>
    </div>

    <!-- CONTENEDOR PRINCIPAL: DASHBOARD -->
    <div id="app-container" class="layout-app hidden">
        <!-- Sidebar -->
        <aside class="sidebar glass-panel">
            <div class="sidebar-header">
                <i class="ph ph-cpu brand-icon"></i>
                <h2>GLPI Ayto</h2>
            </div>
            <nav class="nav-menu">
                <a href="#" class="nav-item active" data-view="dashboard">
                    <i class="ph ph-squares-four"></i> Dashboard
                </a>
                <a href="#" class="nav-item" data-view="tickets">
                    <i class="ph ph-ticket"></i> Mis Tickets
                </a>
                <a href="#" class="nav-item hidden" id="nav-tech-panel" data-view="tech">
                    <i class="ph ph-wrench"></i> Panel Técnico
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <i class="ph ph-user-circle"></i>
                    <span id="display-username">Cargando...</span>
                </div>
                <button id="btn-logout" class="btn-icon" title="Cerrar sesión">
                    <i class="ph ph-sign-out"></i>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header glass-panel">
                <div class="header-title">
                    <h2 id="view-title">Dashboard</h2>
                </div>
                <div class="header-actions">
                    <button class="btn-primary" id="btn-new-ticket">
                        <i class="ph ph-plus"></i> Nuevo Ticket
                    </button>
                </div>
            </header>

            <div class="content-area">
                <!-- VIEW: Dashboard -->
                <div id="view-dashboard" class="view-section">
                    <div class="stats-grid">
                        <div class="stat-card glass-card">
                            <div class="stat-icon info"><i class="ph ph-folder-open"></i></div>
                            <div class="stat-info">
                                <h3>Abiertos</h3>
                                <p class="stat-number" id="stat-open">0</p>
                            </div>
                        </div>
                        <div class="stat-card glass-card">
                            <div class="stat-icon warning"><i class="ph ph-clock-countdown"></i></div>
                            <div class="stat-info">
                                <h3>En progreso</h3>
                                <p class="stat-number" id="stat-progress">0</p>
                            </div>
                        </div>
                        <div class="stat-card glass-card">
                            <div class="stat-icon success"><i class="ph ph-check-circle"></i></div>
                            <div class="stat-info">
                                <h3>Resueltos</h3>
                                <p class="stat-number" id="stat-resolved">0</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- VIEW: Mis Tickets -->
                <div id="view-tickets" class="view-section hidden">
                    <div class="data-table-container glass-card">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Asunto</th>
                                    <th>Categoría</th>
                                    <th>Estado</th>
                                    <th>Prioridad</th>
                                    <th>Fecha</th>
                                </tr>
                            </thead>
                            <tbody id="tickets-tbody">
                                <!-- Tickets inyectados por JS -->
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- MODAL NUEVO TICKET -->
    <div id="modal-ticket" class="modal-overlay hidden">
        <div class="modal-content glass-card">
            <div class="modal-header">
                <h2>Abrir Nueva Incidencia</h2>
                <button class="btn-icon close-modal"><i class="ph ph-x"></i></button>
            </div>
            <div class="modal-body">
                <form id="new-ticket-form">
                    <div class="input-group">
                        <label for="ticket-title">Resumen del problema</label>
                        <input type="text" id="ticket-title" required placeholder="Ej: Error al abrir Firmadoc">
                    </div>
                    
                    <div class="input-group">
                        <label for="ticket-category">Categoría (Seleccione del problema)</label>
                        <select id="ticket-category" required>
                            <option value="">Cargando categorías...</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="ticket-desc">Descripción detallada</label>
                        <textarea id="ticket-desc" rows="4" required placeholder="Por favor, describe exactamente qué ocurre..."></textarea>
                    </div>

                    <div class="modal-actions">
                        <button type="button" class="btn-secondary close-modal">Cancelar</button>
                        <button type="submit" class="btn-primary">Enviar Incidencia</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
